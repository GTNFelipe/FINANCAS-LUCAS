<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado com gradiente rosa→âmbar -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Carteira: corpo -->
  <rect x="14" y="32" width="58" height="38" rx="9" fill="white" opacity="0.95"/>

  <!-- Aba superior da carteira -->
  <rect x="14" y="26" width="58" height="14" rx="9" fill="white" opacity="0.75"/>

  <!-- Pocket / bolso direito -->
  <rect x="50" y="38" width="22" height="24" rx="7" fill="#fce7f3" opacity="0.9"/>

  <!-- Moeda no bolso -->
  <circle cx="61" cy="50" r="8" fill="url(#coinGrad)"/>
  <!-- Símbolo $ na moeda -->
  <text
    x="61" y="54.5"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    font-weight="900"
    fill="#92400e"
    text-anchor="middle"
  >$</text>

  <!-- Linha de detalhe na carteira -->
  <rect x="20" y="44" width="24" height="3" rx="1.5" fill="#f9a8d4" opacity="0.7"/>
  <rect x="20" y="51" width="16" height="3" rx="1.5" fill="#f9a8d4" opacity="0.5"/>
</svg>