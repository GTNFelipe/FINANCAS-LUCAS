<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Corpo principal da carteira com cantos arredondados -->
  <rect x="10" y="25" width="80" height="50" rx="12" stroke="url(#walletGrad)" stroke-width="7" stroke-linejoin="round" />

  <!-- Aba de fecho na lateral direita -->
  <path d="M60 40 h18 c5 0, 8 4, 8 10 c0 6, -3 10, -8 10 h-18 Z" stroke="url(#walletGrad)" stroke-width="7" stroke-linejoin="round" />

  <!-- Botão de pressão do fecho -->
  <circle cx="68" cy="50" r="4.5" fill="url(#walletGrad)" />
</svg>